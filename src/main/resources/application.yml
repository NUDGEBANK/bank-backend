spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: bank-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nudgebank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 9999

ocr:
  base-url: ${OCR_BASE_URL}
  connect-timeout-ms: 5000
  read-timeout-ms: 120000

jwt:
  secret: ${JWT_SECRET:}
  access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:}

ai:
  pipeline:
    python-command: ${NUDGEBANK_AI_PYTHON:.venv/bin/python}
    working-dir: ${NUDGEBANK_AI_WORKDIR:../nudgebank-ai}
