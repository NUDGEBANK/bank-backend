spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: bank-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nudgebank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9999

jwt:
  secret: ${JWT_SECRET:ZGVmYXVsdC1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LTI1Ni1iaXRzLWtleQ==}
  access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:1800}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
