services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nudgebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nudge-net

  bank-backend:
    build: .
    container_name: nudge-bank-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST}:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}

      OCR_BASE_URL: ${OCR_BASE_URL}
    depends_on:
      - postgres
    networks:
      - nudge-net

  bank-frontend:
    build: ../bank-frontend
    container_name: nudge-bank-frontend
    ports:
      - "80:80"
    depends_on:
      - bank-backend
    networks:
      - nudge-net

  bank-ocr:
    build: ../bank-ocr
    container_name: nudge-bank-ocr
    environment:
      - TZ=Asia/Seoul
    networks:
      - nudge-net

  bank-chatbot:
    build: ../bank-chatbot
    container_name: nudge-bank-chatbot
    environment:
      - TZ=Asia/Seoul

      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}

networks:
  nudge-net:

volumes:
  postgres-data:
