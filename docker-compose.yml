services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nudgebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nudge-net

  bank-backend:
    build:
      context: ..
      dockerfile: bank-backend/Dockerfile
    container_name: nudge-bank-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - nudge-net

  bank-frontend:
    build:
      context: ..
      dockerfile: bank-frontend/Dockerfile
    container_name: nudge-bank-frontend
    ports:
      - "80:80"
    depends_on:
      - bank-backend
    networks:
      - nudge-net

  bank-ocr:
    build:
      context: ..
      dockerfile: bank-ocr/Dockerfile
    container_name: nudge-bank-ocr
    environment:
      - TZ=Asia/Seoul
    networks:
      - nudge-net

  bank-chatbot:
    build:
      context: ..
      dockerfile: bank-chatbot/Dockerfile
    container_name: nudge-bank-chatbot
    env_file:
      - .env
    networks:
      - nudge-net

networks:
  nudge-net:

volumes:
  postgres-data:
