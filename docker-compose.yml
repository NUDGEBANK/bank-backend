services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nudgebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nudgebank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: